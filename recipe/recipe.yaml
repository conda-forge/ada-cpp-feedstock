schema_version: 1

context:
  name: ada-cpp
  version: "0.6.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  - url: https://github.com/Krande/adacpp/archive/refs/tags/v${{ version }}.tar.gz
    sha256: f861d284a097124cc895d53ab45c425eb337e33b3e04b9cdb3b4650c58b2e790

build:
  number: 0
  skip: match(python, "<3.10")

requirements:
  build:
    - ${{ stdlib("c") }}
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - if: unix
      then: ${{ cdt('mesa-libGL-devel') }}
    - cmake
    - ninja
  host:
    - python
    - occt
    - ifcopenshell >=0.8.5
    - rocksdb >=10.6.2
    - zlib
    - cgal-cpp
    - nanobind
    - cli11
    - tinygltf
    - gmsh
    - pip
    - setuptools
    - wheel
  run:
    - python
    - ${{ pin_compatible('gmsh', upper_bound='x.x') }}
  run_exports:
    - ${{ pin_subpackage(name, upper_bound='x.x.x') }}

tests:
  - files:
      source:
        - tests
        - files
    requirements:
      run:
        - pytest
    script:
      - pytest tests

about:
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: A module with drop-in replacement functions for ada-py written in c++ to improve performance.
  homepage: https://github.com/Krande/adacpp

extra:
  recipe-maintainers:
    - Krande
