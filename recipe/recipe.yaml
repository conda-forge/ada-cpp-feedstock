schema_version: 1

context:
  name: ada-cpp
  version: "0.3.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  - url: https://github.com/Krande/adacpp/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 05fde4c9c3de684f684c0101588ad78d21715a6ad933bf67bf4f97fd6bdc8ccf
    patches:
      - patches/link_rocksdb.patch

build:
  number: 0
  skip: match(python, "<3.10")

requirements:
  build:
    - ${{ stdlib("c") }}
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - if: unix
      then: ${{ cdt('mesa-libGL-devel') }}
    - cmake
    - ninja
    - if: unix
      then: make
  host:
    - python
    - occt
    - ifcopenshell
    - cgal-cpp
    - nanobind
    - cli11
    - tinygltf
    - gmsh
    - pip
    - setuptools
    - wheel
    # rocksdb (static .a) + snappy/lz4/zstd are needed because ifcopenshell
    # statically embeds rocksdb in libIfcParse.a/libIfcGeom.a; downstream consumers
    # therefore have to bring rocksdb's static archive and its dynamic compression
    # deps along. See patches/link_rocksdb.patch and facebook/rocksdb#981.
    - rocksdb
    - snappy
    - lz4
    - zstd
  run:
    - python
    - ${{ pin_compatible('gmsh', upper_bound='x.x') }}
  run_exports:
    - ${{ pin_subpackage(name, upper_bound='x.x.x') }}

tests:
  - files:
      source:
        - tests/*
        - files/*
    requirements:
      run:
        - pytest
        - occt * *novtk*
        - cmake
    script:
      # Skip test_ifc_file_read: ifcopenshell 0.8.5's IfcFile constructor + destructor
      # crash with heap corruption when libIfcParse.a is statically linked into a
      # downstream consumer. Tracking upstream IfcOpenShell issue #7131 ("Remove once
      # newer builds don't segfault on Linux"). Re-enable once fixed upstream.
      - pytest tests/py --deselect tests/py/test_basic.py::test_ifc_file_read

about:
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: A module with drop-in replacement functions for ada-py written in c++ to improve performance.
  homepage: https://github.com/Krande/adacpp

extra:
  recipe-maintainers:
    - Krande
